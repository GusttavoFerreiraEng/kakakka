<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso do Sistema</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a2e 0%, #05050a 100%);
            overflow: hidden;
            font-family: 'Orbitron', sans-serif; /* Fonte futurista */
        }

        .container {
            position: relative;
            text-align: center;
        }

        /* O Coração em SVG com Brilho Duplo */
        svg {
            width: 350px;
            filter: drop-shadow(0 0 10px #ff0055) drop-shadow(0 0 30px #ff0055);
            animation: pulse 2s infinite ease-in-out 4s; /* Pulsa após desenhar */
        }

        .heart-path {
            fill: none;
            stroke: #ff0055;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards;
        }

        /* O Núcleo Branco do Sabre */
        .heart-core {
            fill: none;
            stroke: #fff;
            stroke-width: 1.2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards;
        }

        /* Texto da Louça com Neon */
        .mensagem {
            margin-top: 30px;
            color: #fff;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055;
            animation: fadeIn 0.8s ease-out 3.5s forwards;
        }

        /* Animações */
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fadeIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px #ff0055); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px #ff0055); }
        }

        /* Fundo com partículas estáticas (Zoeira de Estrelas) */
        .bg-stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 100px 100px;
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-stars"></div>

    <div class="container">
        <svg viewBox="0 0 32 32">
            <path class="heart-path" d="M16 28.5L14.1 26.7C7.4 20.6 3 16.6 3 11.7C3 7.7 6.2 4.5 10.2 4.5C12.4 4.5 14.6 5.5 16 7.2C17.4 5.5 19.6 4.5 21.8 4.5C25.8 4.5 29 7.7 29 11.7C29 16.6 24.6 20.6 17.9 26.7L16 28.5Z"/>
            <path class="heart-core" d="M16 28.5L14.1 26.7C7.4 20.6 3 16.6 3 11.7C3 7.7 6.2 4.5 10.2 4.5C12.4 4.5 14.6 5.5 16 7.2C17.4 5.5 19.6 4.5 21.8 4.5C25.8 4.5 29 7.7 29 11.7C29 16.6 24.6 20.6 17.9 26.7L16 28.5Z"/>
        </svg>

        <div class="mensagem">Já lavou a louça?</div>
    </div>

</body>
</html>
