<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>System Check - Gustavo</title>
    <style>
        body {
            margin: 0;
            background: #05050a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            position: absolute;
            filter: drop-shadow(0 0 10px #ff0055);
        }

        #aviso {
            position: relative;
            color: white;
            font-size: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease 4s;
            text-shadow: 0 0 10px #ff0055;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="aviso">Pra minha vida</div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let w, h, particulas = [];

        // Ajusta o tamanho da tela do seu ASUS
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        // Fórmula do coração que não falha
        function heartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        // Criar as "Células"
        for (let i = 0; i < 500; i++) {
            particulas.push({
                t: Math.random() * Math.PI * 2, // Ponto no coração
                speed: Math.random() * 0.02 + 0.01,
                r: Math.random() * 2 + 1,
                alpha: Math.random(),
                dist: Math.random() * 500 + 500 // Distância inicial (soltas)
            });
        }

        function draw() {
            // Rastro fluido
            ctx.fillStyle = "rgba(5, 5, 10, 0.1)";
            ctx.fillRect(0, 0, w, h);

            particulas.forEach(p => {
                // Elas vão se aproximando do formato (fluidez)
                if (p.dist > 0) p.dist -= 5; 
                
                let pos = heartPoint(p.t);
                // O ponto final + a distância de "célula solta"
                let x = w / 2 + pos.x + (Math.cos(p.t) * p.dist);
                let y = h / 2 + pos.y + (Math.sin(p.t) * p.dist);

                ctx.fillStyle = `rgba(255, 20, 147, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, p.r, 0, Math.PI * 2);
                ctx.fill();

                p.t += p.speed; // Movimento leve
            });

            requestAnimationFrame(draw);
        }

        // Mostra a zoeira depois
        setTimeout(() => {
            document.getElementById("aviso").style.opacity = "1";
        }, 1000);

        draw();
    </script>
</body>
</html>
